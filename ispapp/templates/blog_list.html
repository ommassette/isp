{% extends 'base.html' %}
{% block content %}

<section class="py-5 bg-light">
    <div class="container">
        <h2 class="text-center fw-bold mb-5 text-purple">Our Blog</h2>
        <div class="row g-4">
            {% for item in items %}
            <div class="col-md-4">
                <div class="card h-100 border-0 shadow-sm overflow-hidden">
                    {% if item.preview_image %}
                        <img src="{{ item.preview_image.url }}" class="card-img-top" alt="{{ item.heading }}" style="height: 200px; object-fit: cover;">
                    {% endif %}
                    <div class="card-body">
                        <small class="text-muted">{{ item.date|date:"M d, Y" }}</small>
                        <h5 class="fw-bold mt-2 text-purple">{{ item.heading }}</h5>
                        <p class="text-muted small">{{ item.description|truncatewords:20 }}</p>
                        <a href="{% url 'blog_detail' item.id %}" class="btn btn-outline-purple btn-sm rounded-pill px-4">Read Article</a>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center">
                <p>No blog posts found.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

{% endblock %}
