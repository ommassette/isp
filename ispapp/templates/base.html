<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tornet - Wireless Internet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --primary-purple: #2e026d; --accent-lime: #f3ffcc; --deep-violet: #450a7a; }
        body { font-family: 'Inter', sans-serif; }
        .bg-gradient-purple { background: linear-gradient(135deg, var(--primary-purple), var(--deep-violet)); }
        .text-purple { color: var(--primary-purple); }
        .btn-lime { background-color: var(--accent-lime); color: var(--primary-purple); border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient-purple sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'my_index' %}">TORNET</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'my_index' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'package_list' %}">Packages</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'blogs' %}">Blog</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gradient-purple text-white py-5 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 TorNet Africa Limited. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
