{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<section class="feedback mt-5 py-5">
    <form method="POST">
        {% csrf_token %}
        <fieldset class="form-group">
            <h4 class="border-bottom mb-4">Log In</h4>
            {{ form|crispy }}
        </fieldset>
        <div class="form-group mt-3">
            <button class="btn-dark" type="submit">Login</button>
        </div>
        <div class="border-top pt-3 mt-3">
            <small>Don't have an Account? <a class="ms-2 nav-link2" href="{% url 'register' %}">Sign Up</a></small>
        </div>
    </form>
</section>
{% endblock %}
